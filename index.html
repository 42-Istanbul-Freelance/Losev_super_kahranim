<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LÖSEV - Eğitim ve Farkındalık Platformu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Login & Registration Screen -->
        <section id="auth-screen" class="screen active">
            <div class="auth-container">

                <header class="auth-header">
                    <div class="logo-box">
                        <img src="./losev_logo.png" alt="LÖSEV Logo" id="brand-logo">
                    </div>
                    <h2>Farkındalık Platformu</h2>
                    <p>Öğren, bilinçlen, dayanışmaya katıl.</p>
                </header>

                <!-- Tabs (Login / Register) -->
                <div class="auth-tabs" id="auth-tabs">
                    <button class="tab-btn active" data-tab="login">Giriş Yap</button>
                    <button class="tab-btn" data-tab="register">Kayıt Ol</button>
                </div>

                <!-- Forms Container -->
                <div class="forms-wrapper">

                    <!-- Login Form -->
                    <form id="login-form" class="auth-form active-form">
                        <div class="input-group">
                            <label for="login-email">E-posta Adresi</label>
                            <input type="email" id="login-email" placeholder="ornek@eposta.com" required>
                        </div>
                        <div class="input-group">
                            <label for="login-password">Şifre</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Giriş Yap</button>
                    </form>

                    <!-- Registration Form -->
                    <form id="register-form" class="auth-form">
                        <div class="input-group">
                            <label for="reg-name">Adınız Soyadınız</label>
                            <input type="text" id="reg-name" placeholder="Adınız Soyadınız" required>
                        </div>
                        <div class="input-group">
                            <label for="reg-email">E-posta Adresi</label>
                            <input type="email" id="reg-email" placeholder="ornek@eposta.com" required>
                        </div>
                        <div class="input-group">
                            <label for="reg-password">Şifre</label>
                            <input type="password" id="reg-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Hesap Oluştur</button>
                    </form>

                </div>

                <div class="divider">
                    <span>VEYA</span>
                </div>

                <button id="guest-btn" class="btn btn-outline btn-block">Misafir Olarak Dene</button>

            </div>
        </section>

        <!-- Main Educational Dashboard / Map -->
        <section id="home-screen" class="screen">
            <!-- App Header -->
            <header class="app-header"
                style="display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #eee; background:white; position:sticky; top:0; z-index:10;">
                <div class="user-greeting" style="display:flex; align-items:center; gap:10px;">
                    <!-- Maskot: Kelebek Ana Ekranda (Büyük, Sabit, Sınırları Yok) -->
                    <div
                        style="width:70px; height:70px; display:flex; justify-content:center; align-items:center; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
                        <svg viewBox="0 0 100 100" class="butterfly" xmlns="http://www.w3.org/2000/svg"
                            style="width:100%; height:100%;">
                            <path class="wing left-wing" d="M50 50 C 10 0, 0 40, 20 60 C 0 80, 20 100, 50 50"
                                fill="#E30613" opacity="0.9" />
                            <path class="wing right-wing" d="M50 50 C 90 0, 100 40, 80 60 C 100 80, 80 100, 50 50"
                                fill="#0081C6" opacity="0.9" />
                            <rect x="48" y="40" width="4" height="30" rx="2" fill="#000000" />
                        </svg>
                    </div>
                    <div>
                        <small style="color:#666;">Hoş Geldin,</small>
                        <h3 id="welcome-message" style="color:#f26522; font-size:1.1rem; margin:0;">Öğrenci</h3>
                    </div>
                </div>
                <!-- Gamification Stats -->
                <div class="user-stats" style="display:flex; gap:15px; font-weight:bold;">
                    <div class="stat-badge streak" style="color:#f26522;">
                        <span>🔥</span> <span id="streak-count">1</span>
                    </div>
                    <div class="stat-badge xp" style="color:#facc15;">
                        <span>⭐</span> <span id="xp-count">0</span>
                    </div>
                </div>
            </header>

            <!-- Learning Map / Path -->
            <main class="learning-map" id="learning-map"
                style="flex:1; padding:30px 20px 80px; position:relative; display:flex; flex-direction:column; align-items:center; gap:40px;">
                <!-- Modules injected by JS -->
            </main>

            <!-- Bottom Nav -->
            <nav class="bottom-nav"
                style="position:sticky; bottom:0; background:white; display:flex; justify-content:space-around; padding: 15px 0 25px 0; border-top:1px solid #eee; z-index:10; width:100%;">
                <button class="nav-btn active"
                    style="border:none; background:none; color:#f26522; display:flex; flex-direction:column; align-items:center;">
                    <span style="font-size:1.3rem;">🗺️</span> Harita
                </button>
                <button class="nav-btn"
                    style="border:none; background:none; color:#aaa; display:flex; flex-direction:column; align-items:center;"
                    id="logout-btn">
                    <span style="font-size:1.3rem;">🚪</span> Çıkış
                </button>
            </nav>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen bg-white" style="background:#fff;">
            <header class="quiz-header" style="display:flex; align-items:center; padding:20px; gap:15px;">
                <button id="quit-quiz"
                    style="border:none; background:none; font-size:1.5rem; cursor:pointer; color:#aaa;">❌</button>
                <div style="flex:1; height:12px; background:#f4f7fa; border-radius:6px; overflow:hidden;">
                    <div id="quiz-progress" style="width:0%; height:100%; background:#f26522; transition:0.3s;"></div>
                </div>
                <div style="font-weight:bold; color:#ef4444;">❤️ <span id="heart-count">3</span></div>
            </header>
            <main style="flex:1; padding:20px; display:flex; flex-direction:column; justify-content:center;">
                <h2 id="question-text" style="font-size:1.4rem; margin-bottom:30px; line-height:1.4;">Soru...</h2>
                <div id="options-container" style="display:flex; flex-direction:column; gap:15px;"></div>
            </main>
            <footer style="padding:20px; border-top:1px solid #eee;">
                <button id="check-answer-btn" class="btn btn-primary btn-block" disabled>Kontrol Et</button>
            </footer>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="screen bg-white"
            style="background:#fff; justify-content:center; align-items:center; text-align:center; padding:30px;">
            <div style="width:120px; height:120px; margin:0 auto 20px;" class="butterfly-container">
                <svg viewBox="0 0 100 100" class="butterfly flapping" xmlns="http://www.w3.org/2000/svg">
                    <path class="wing left-wing" d="M50 50 C 10 0, 0 40, 20 60 C 0 80, 20 100, 50 50" fill="#E30613"
                        opacity="0.9" />
                    <path class="wing right-wing" d="M50 50 C 90 0, 100 40, 80 60 C 100 80, 80 100, 50 50"
                        fill="#0081C6" opacity="0.9" />
                    <rect x="48" y="40" width="4" height="30" rx="2" fill="#000000" />
                </svg>
            </div>
            <h1 style="color:#10b981; margin-bottom:10px;">Bölüm Tamamlandı!</h1>
            <p style="color:#666; margin-bottom:30px;">Doğrulanmış Bilgi Kalkanını Güçlendirdin.</p>
            <div style="padding:15px 30px; border:2px solid #facc15; border-radius:12px; margin-bottom:40px;">
                <div style="color:#aaa; font-weight:bold; font-size:0.8rem;">KAZANILAN XP</div>
                <div id="earned-xp" style="color:#facc15; font-size:2rem; font-weight:800;">+15</div>
            </div>
            <button id="finish-lesson-btn" class="btn btn-primary btn-block">Haritaya Dön</button>
        </section>

        <!-- Feedback Overlay -->
        <div id="feedback-overlay"
            style="position:absolute; bottom:0; left:0; width:100%; padding:30px 20px; display:flex; flex-direction:column; gap:20px; border-radius:20px 20px 0 0; transform:translateY(100%); transition:0.3s; z-index:50;">
            <div style="display:flex; align-items:flex-start; gap:15px;">
                <div>
                    <h3 id="feedback-title" style="font-size:1.4rem; font-weight:bold; margin-bottom:8px;"></h3>
                    <p id="feedback-message" style="color:#444; line-height:1.4;"></p>
                </div>
            </div>
            <button id="feedback-next-btn" class="btn btn-primary btn-block">Devam Et</button>
        </div>

    </div>

    <!-- Center Screen Butterfly Popup (Hidden by default) -->
    <div id="center-butterfly-popup"
        style="position:fixed; top:50%; left:50%; margin-left:-75px; margin-top:-75px; width:150px; height:150px; z-index:9999; display:none; pointer-events:none; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));">
        <svg viewBox="0 0 100 100" class="butterfly flapping" xmlns="http://www.w3.org/2000/svg"
            style="width:100%; height:100%;">
            <path class="wing left-wing" d="M50 50 C 10 0, 0 40, 20 60 C 0 80, 20 100, 50 50" fill="#E30613"
                opacity="0.9" />
            <path class="wing right-wing" d="M50 50 C 90 0, 100 40, 80 60 C 100 80, 80 100, 50 50" fill="#0081C6"
                opacity="0.9" />
            <rect x="48" y="40" width="4" height="30" rx="2" fill="#000000" />
        </svg>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
